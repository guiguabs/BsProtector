<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BsProtector | Cotação de Seguros</title>

<style>
:root { --blue-dark: #002d72; --blue-primary: #007bff; --accent: #ff8c00; }
body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; margin: 0; }
.navbar { background: var(--blue-dark); padding: 15px; border-bottom: 3px solid var(--accent); color: white; text-align: center; }
.hero { background: linear-gradient(135deg, var(--blue-primary), var(--blue-dark)); color: white; padding: 60px 20px; text-align: center; }
.form-box { background: white; padding: 40px; border-radius: 25px; border-top: 5px solid var(--accent); max-width: 800px; margin: -50px auto 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }
.form-label { font-weight: bold; color: var(--blue-dark); font-size: 0.9rem; }
.form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
.btn-send { background: var(--accent); color: white; padding: 18px; border-radius: 50px; font-weight: bold; border: none; width: 100%; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
.btn-send:hover { background: #e67e00; transform: scale(1.02); }
.whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
footer { text-align: center; padding: 40px; color: #666; font-size: 0.8rem; }
</style>
</head>
